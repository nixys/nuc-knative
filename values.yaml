# -- Override the default chart label name if needed.
nameOverride: ""

# -- Extra labels applied to every rendered resource.
commonLabels: {}
# -- Extra annotations applied to every rendered resource.
commonAnnotations: {}

# Default apiVersions for the supported Knative resources.
apiVersions:
  # -- Default apiVersion for Certificate resources.
  certificate: networking.internal.knative.dev/v1alpha1
  # -- Default apiVersion for ClusterDomainClaim resources.
  clusterDomainClaim: networking.internal.knative.dev/v1alpha1
  # -- Default apiVersion for Configuration resources.
  configuration: serving.knative.dev/v1
  # -- Default apiVersion for DomainMapping resources.
  domainMapping: serving.knative.dev/v1beta1
  # -- Default apiVersion for Image resources.
  image: caching.internal.knative.dev/v1alpha1
  # -- Default apiVersion for Ingress resources.
  ingress: networking.internal.knative.dev/v1alpha1
  # -- Default apiVersion for Metric resources.
  metric: autoscaling.internal.knative.dev/v1alpha1
  # -- Default apiVersion for PodAutoscaler resources.
  podAutoscaler: autoscaling.internal.knative.dev/v1alpha1
  # -- Default apiVersion for Revision resources.
  revision: serving.knative.dev/v1
  # -- Default apiVersion for Route resources.
  route: serving.knative.dev/v1
  # -- Default apiVersion for ServerlessService resources.
  serverlessService: networking.internal.knative.dev/v1alpha1
  # -- Default apiVersion for Service resources.
  service: serving.knative.dev/v1

# Each list item supports:
# - name: required
# - namespace: optional for namespaced resources, defaults to the release namespace
# - labels: optional
# - annotations: optional
# - apiVersion: optional override for a single resource
# - spec: arbitrary resource spec
# - status: optional raw status block for fixtures and synthetic manifests

# -- Certificate resources to render.
certificates: []

# -- ClusterDomainClaim resources to render.
clusterDomainClaims: []

# -- Configuration resources to render.
configurations: []

# -- DomainMapping resources to render.
domainMappings: []

# -- Image resources to render.
images: []

# -- Ingress resources to render.
ingresses: []

# -- Metric resources to render.
metrics: []

# -- PodAutoscaler resources to render.
podAutoscalers: []

# -- Revision resources to render.
revisions: []

# -- Route resources to render.
routes: []

# -- ServerlessService resources to render.
serverlessServices: []

# -- Service resources to render.
services: []
