{{- range $name, $item := .Values.serverlessServices }}
---
{{ include "nuc-knative.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "ServerlessService"
  "defaultApiVersion" $.Values.apiVersions.serverlessService
  "resourceKey" "serverlessServices"
  "namespaced" true
) }}
{{- end }}
