{{- range $name, $item := .Values.domainMappings }}
---
{{ include "nuc-knative.renderResource" (dict
  "root" $
  "item" $item
  "resourceName" $name
  "kind" "DomainMapping"
  "defaultApiVersion" $.Values.apiVersions.domainMapping
  "resourceKey" "domainMappings"
  "namespaced" true
) }}
{{- end }}
