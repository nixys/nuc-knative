{{- range $index, $item := .Values.configurations }}
---
{{ include "nuc-knative.renderResource" (dict
  "root" $
  "item" $item
  "kind" "Configuration"
  "defaultApiVersion" $.Values.apiVersions.configuration
  "resourceKey" (printf "configurations[%d]" $index)
  "namespaced" true
) }}
{{- end }}
